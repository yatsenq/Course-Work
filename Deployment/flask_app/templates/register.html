{% extends 'base.html' %} {% block title %}Реєстрація · News AI{% endblock %} {%
block content %}
<div class="c auth">
	<h2 style="font-size: 16px; margin-bottom: 4px">Реєстрація</h2>
	<p>Створи акаунт для збереження перевірок.</p>
	<form method="post" class="auth-form">
		<input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
		<label>Ім'я</label
		><input type="text" name="username" placeholder="Ваше ім'я" required />
		<label>Email</label
		><input type="email" name="email" placeholder="you@example.com" required />
		<label>Пароль</label
		><input
			type="password"
			name="password"
			minlength="6"
			placeholder="Мін. 6 символів"
			required
		/>
		<button type="submit" class="btn btn-p">Зареєструватися</button>
	</form>
	<div class="auth-links">
		<a href="{{ url_for('guest') }}">Гість</a
		><a href="{{ url_for('login') }}">Є акаунт?</a>
	</div>
</div>
{% endblock %}
