{% extends 'base.html' %} {% block title %}Реєстрація{% endblock %} {% block
content %}
<section class="auth-shell">
	<div class="card auth-card">
		<div class="eyebrow">Реєстрація</div>
		<h2>Створити акаунт</h2>
		<p>Після реєстрації історія перевірок зберігатиметься у базі даних.</p>
		<form method="post">
			<label>Ім'я користувача</label>
			<input type="text" name="username" placeholder="your_name" required />

			<label>Email</label>
			<input
				type="email"
				name="email"
				placeholder="name@example.com"
				required
			/>

			<label>Пароль</label>
			<input
				type="password"
				name="password"
				minlength="6"
				placeholder="мінімум 6 символів"
				required
			/>

			<button type="submit" class="btn btn-primary">Зареєструватися</button>
		</form>
		<div class="auth-links">
			<a href="{{ url_for('guest') }}">Продовжити як гість</a>
			<a href="{{ url_for('login') }}">Вже є акаунт?</a>
		</div>
	</div>
</section>
{% endblock %}
